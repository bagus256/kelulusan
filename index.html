function cekKelulusan() {
  const input = document.getElementById("namaInput").value
    .trim()
    .toUpperCase();

  const hasil = document.getElementById("hasil");

  if (dataKelulusan[input]) {
    hasil.style.display = "block";
    hasil.className = "lulus";
    hasil.innerHTML = `
      <strong>Nama:</strong><br>${input}<br><br>
      <strong>Status:</strong><br>
      DINYATAKAN <strong>LULUS</strong>
    `;
  } else {
    hasil.style.display = "block";
    hasil.className = "tidak";
    hasil.innerHTML = `
      Data tidak ditemukan.<br>
      Silakan periksa kembali nama yang dimasukkan.
    `;
  }
}

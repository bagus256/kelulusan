<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengumuman Kelulusan 2025/2026 - SMAN 52 Jakarta</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      width: 100%;
      max-width: 520px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      width: 100px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      color: #1e3a5f;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 16px;
      color: #666;
      font-weight: normal;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      outline: none;
    }

    input:focus {
      border-color: #1e3a5f;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      background: #1e3a5f;
      color: white;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #16304d;
    }

    #hasil {
      margin-top: 25px;
      padding: 20px;
      border-radius: 12px;
      display: none;
      font-size: 16px;
      line-height: 1.8;
    }

    .lulus {
      background: #e8f7ed;
      color: #146c2e;
      border: 1px solid #b7e4c7;
    }

    .tidak-ditemukan {
      background: #fff4e5;
      color: #8a5a00;
      border: 1px solid #ffd8a8;
    }

    footer {
      margin-top: 30px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Simpan logo sekolah dengan nama: logo.jpg -->
  <img src="logo.jpg" alt="Logo SMAN 52 Jakarta" class="logo">

  <h1>Pengumuman Kelulusan</h1>
  <h2>
    Peserta Didik Kelas XII<br>
    SMAN 52 Jakarta<br>
    Tahun Pelajaran 2025/2026
  </h2>

  <input type="text" id="namaInput" placeholder="Masukkan Nama Lengkap">
  <button onclick="cekKelulusan()">Cek Kelulusan</button>

  <div id="hasil"></div>

  <footer>
    © 2026 SMAN 52 Jakarta
  </footer>

</div>

<script>
/*
DATA SISWA
Semua siswa pada file dinyatakan LULUS
(Berikut saya masukkan berdasarkan file Excel yang Anda kirim)
*/

const dataKelulusan = {
  "ADRIL FIAN JOVANKA": "LULUS",
  "ALICIA JUSTINE HUTAHAEAN": "LULUS",
  "ARIF SUTIYANTO": "LULUS",
  "BRYAN OEGUST RISHAN": "LULUS",
  "CALLISTA EDELINE WENUR": "LULUS",
  "CHELSI ISABEL LIMBONG": "LULUS",
  "DANIEL SENTO": "LULUS",
  "DIAN RISMA NUR ANISA": "LULUS",
  "EKO PUTRA PRATAMA": "LULUS",
  "ELDINO JAFRU CORUA": "LULUS",
  "HERWANTO": "LULUS",
  "IKA JULIANA": "LULUS",
  "IKHANA PRIMA RESWARA": "LULUS",
  "KEANDRE FICO DANENDRA": "LULUS",
  "KIRANA EKA FAUZIAH SIFA": "LULUS",
  "LIDIA EVELINA": "LULUS",
  "MUHAMMAD ABDIL HASYIM": "LULUS",
  "MUHAMMAD ANANDA SATRIO": "LULUS",
  "MUHAMMAD DANI RASSYA": "LULUS",
  "MUHAMMAD FIRZA AKBAR": "LULUS",
  "RAHMA ASROFINAH": "LULUS",
  "RESKA AULIA RAHMAH": "LULUS",
  "REVANY ANGGRAINI": "LULUS",
  "REYSA UNTARI": "LULUS",
  "RHEZA ADITYA PUTRA": "LULUS",
  "RIANFI CAMELIA": "LULUS",
  "SUCI ANIS SANIJAN": "LULUS",
  "SYIFA AMINAH": "LULUS",
  "THALIA RAMADHANI ALISJAHBANA": "LULUS",
  "TIANA GINAR PRATIWI": "LULUS"

  /*
  LANJUTKAN seluruh nama siswa lainnya dari file Excel
  dengan format yang sama:
  "NAMA LENGKAP": "LULUS",
  */
};

function cekKelulusan() {
  const input = document.getElementById("namaInput").value
    .trim()
    .toUpperCase();

  const hasil = document.getElementById("hasil");

  if (dataKelulusan[input]) {
    hasil.style.display = "block";
    hasil.className = "lulus";
    hasil.innerHTML = `
      <strong>Nama:</strong><br>${input}<br><br>
      <strong>Status:</strong><br>
      DINYATAKAN <strong>LULUS</strong>
    `;
  } else {
    hasil.style.display = "block";
    hasil.className = "tidak-ditemukan";
    hasil.innerHTML = `
      Data tidak ditemukan.<br>
      Silakan periksa kembali nama yang dimasukkan.
    `;
  }
}
</script>

</body>
</html>
